<svg viewBox="0 0 1080 400" xmlns="http://www.w3.org/2000/svg" font-family="'Geist', system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/></marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/></marker>
    <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2e5aa8"/></marker>
  </defs>

  <rect width="100%" height="100%" fill="#f5f5f5"/>

  <!-- Transitions (before boxes) -->
  <line x1="44" y1="160" x2="76" y2="160" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="272" y1="160" x2="332" y2="160" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="282" y="144" width="40" height="12" rx="2" fill="#f5f5f5"/>
  <text x="302" y="152" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">START</text>
  <line x1="528" y1="160" x2="588" y2="160" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="538" y="144" width="40" height="12" rx="2" fill="#f5f5f5"/>
  <text x="558" y="152" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">SHIP</text>
  <line x1="784" y1="160" x2="844" y2="160" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
  <rect x="792" y="144" width="44" height="12" rx="2" fill="#f5f5f5"/>
  <text x="814" y="152" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">CLOSE</text>
  <!-- Self-loop: progress-tracker update per phase -->
  <path d="M 400 120 C 384 64, 480 64, 464 120" fill="none" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="408" y="56" width="48" height="12" rx="2" fill="#f5f5f5"/>
  <text x="432" y="64" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">UPDATE</text>
  <!-- Abandon: in-progress back to planned -->
  <path d="M 396 200 C 348 268, 260 268, 212 204" fill="none" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <rect x="272" y="240" width="60" height="12" rx="2" fill="#f5f5f5"/>
  <text x="302" y="248" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">ABANDON</text>

  <!-- Start dot -->
  <circle cx="36" cy="160" r="6" fill="#2d3142"/>

  <!-- State: planned -->
  <rect x="80" y="120" width="192" height="80" rx="8" fill="#f5f5f5"/>
  <rect x="80" y="120" width="192" height="80" rx="8" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <rect x="88" y="128" width="40" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
  <text x="108" y="136" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STATE</text>
  <text x="176" y="164" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">planned</text>
  <text x="176" y="180" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">entry · no worktree</text>

  <!-- State: in-progress -->
  <rect x="336" y="120" width="192" height="80" rx="8" fill="#f5f5f5"/>
  <rect x="336" y="120" width="192" height="80" rx="8" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <rect x="344" y="128" width="40" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
  <text x="364" y="136" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STATE</text>
  <text x="432" y="164" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">in-progress</text>
  <text x="432" y="180" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">worktree + branch live</text>

  <!-- State: completed-pending-approval -->
  <rect x="592" y="120" width="192" height="80" rx="8" fill="#f5f5f5"/>
  <rect x="592" y="120" width="192" height="80" rx="8" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <rect x="600" y="128" width="40" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
  <text x="620" y="136" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STATE</text>
  <text x="688" y="156" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">completed-</text>
  <text x="688" y="172" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">pending-approval</text>
  <text x="688" y="188" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">awaiting /accept-feature</text>

  <!-- State: completed (focal) -->
  <rect x="848" y="120" width="192" height="80" rx="8" fill="#f5f5f5"/>
  <rect x="848" y="120" width="192" height="80" rx="8" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
  <rect x="856" y="128" width="40" height="12" rx="2" fill="transparent" stroke="rgba(235,108,54,0.50)" stroke-width="0.8"/>
  <text x="876" y="136" fill="#eb6c36" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STATE</text>
  <text x="944" y="164" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">completed</text>
  <text x="944" y="180" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">merged to main</text>

  <!-- Callout: scout-status -->
  <text x="1044" y="44" fill="#2d3142" font-size="14" font-style="italic" font-family="'Instrument Serif', Georgia, serif" text-anchor="end">next run offers a refactor cycle</text>
  <path d="M 956 52 Q 944 80 944 108" fill="none" stroke="rgba(45,49,66,0.40)" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="944" cy="112" r="2" fill="#2d3142"/>

  <!-- Callout: abandon semantics -->
  <text x="48" y="332" fill="#4f5d75" font-size="14" font-style="italic" font-family="'Instrument Serif', Georgia, serif">non-feature entries are removed instead</text>
  <path d="M 200 320 Q 252 296 292 268" fill="none" stroke="rgba(45,49,66,0.30)" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="292" cy="264" r="2" fill="#4f5d75"/>

  <!-- Legend -->
  <line x1="40" y1="356" x2="1040" y2="356" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
  <text x="40" y="372" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>
  <rect x="40" y="380" width="24" height="12" rx="4" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="72" y="388" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">ROADMAP Status value</text>
  <rect x="240" y="380" width="24" height="12" rx="4" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
  <text x="272" y="388" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Happy completion</text>
  <line x1="424" y1="386" x2="452" y2="386" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="460" y="388" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Abandon (close --final-status=abandoned)</text>
  <text x="744" y="388" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Every transition is applied by progress-tracker</text>
</svg>
