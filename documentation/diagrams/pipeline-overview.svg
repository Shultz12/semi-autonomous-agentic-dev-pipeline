<svg viewBox="0 0 760 584" xmlns="http://www.w3.org/2000/svg" font-family="'Geist', system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/></marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/></marker>
    <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2e5aa8"/></marker>
  </defs>

  <rect width="100%" height="100%" fill="#f5f5f5"/>

  <!-- Worktree boundary (region, behind everything) -->
  <rect x="268" y="296" width="224" height="96" rx="8" fill="rgba(45,49,66,0.02)" stroke="rgba(45,49,66,0.30)" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="380" y="408" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.10em">ISOLATED WORKTREE</text>
  <text x="380" y="420" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">.worktrees/&lt;slug&gt;/</text>

  <!-- Arrows (before boxes) -->
  <line x1="248" y1="136" x2="276" y2="136" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="480" y1="136" x2="508" y2="136" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Row wrap: SPECIFY down to DESIGN -->
  <path d="M 612 176 L 612 240 L 148 240 L 148 300" fill="none" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="248" y1="344" x2="276" y2="344" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="480" y1="344" x2="508" y2="344" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Post-merge refactor loop (accept-feature back to orchestrator) -->
  <path d="M 612 384 L 612 448 L 456 448 L 456 396" fill="none" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <rect x="484" y="440" width="100" height="16" rx="2" fill="#f5f5f5"/>
  <text x="534" y="452" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">REFACTOR LOOP</text>

  <!-- Stage eyebrows -->
  <text x="148" y="84" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.14em">DEFINE</text>
  <text x="380" y="84" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.14em">GOVERN</text>
  <text x="612" y="84" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.14em">SPECIFY</text>
  <text x="148" y="288" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.14em">DESIGN</text>
  <text x="380" y="288" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.14em">EXECUTE</text>
  <text x="612" y="288" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.14em">ACCEPT</text>

  <!-- Node: product-architect -->
  <rect x="48" y="96" width="200" height="80" rx="6" fill="#f5f5f5"/>
  <rect x="48" y="96" width="200" height="80" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="148" y="132" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">product-architect</text>
  <text x="148" y="152" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">VISION · PRD · ROADMAP</text>

  <!-- Node: tech-stack-architect -->
  <rect x="280" y="96" width="200" height="80" rx="6" fill="#f5f5f5"/>
  <rect x="280" y="96" width="200" height="80" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="380" y="132" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">tech-stack-architect</text>
  <text x="380" y="152" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">charter + TDRs</text>

  <!-- Node: spec-architect -->
  <rect x="512" y="96" width="200" height="80" rx="6" fill="#f5f5f5"/>
  <rect x="512" y="96" width="200" height="80" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="612" y="132" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">spec-architect</text>
  <text x="612" y="152" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">SRS + BDD</text>

  <!-- Node: design-architect -->
  <rect x="48" y="304" width="200" height="80" rx="6" fill="#f5f5f5"/>
  <rect x="48" y="304" width="200" height="80" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="148" y="340" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">design-architect</text>
  <text x="148" y="360" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">SDD</text>

  <!-- Node: orchestrator (focal) -->
  <rect x="280" y="304" width="200" height="80" rx="6" fill="#f5f5f5"/>
  <rect x="280" y="304" width="200" height="80" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
  <text x="380" y="328" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">orchestrator</text>
  <text x="380" y="344" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">plan → build → test → review</text>
  <text x="380" y="360" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">feature·refactor·primitives·bugfix</text>

  <!-- Node: accept-feature -->
  <rect x="512" y="304" width="200" height="80" rx="6" fill="#f5f5f5"/>
  <rect x="512" y="304" width="200" height="80" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="612" y="340" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">accept-feature</text>
  <text x="612" y="360" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">merge --no-ff → main</text>

  <!-- Annotation callout -->
  <text x="48" y="496" fill="#2d3142" font-size="14" font-style="italic" font-family="'Instrument Serif', Georgia, serif">automated from here to merge</text>
  <path d="M 244 488 Q 256 432 262 380" fill="none" stroke="rgba(45,49,66,0.40)" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="264" cy="376" r="2" fill="#2d3142"/>

  <!-- Legend -->
  <line x1="48" y1="528" x2="712" y2="528" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
  <text x="48" y="544" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>
  <rect x="48" y="556" width="24" height="12" rx="2" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="80" y="564" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Skill (you invoke)</text>
  <rect x="200" y="556" width="24" height="12" rx="2" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
  <text x="232" y="564" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Focal — orchestrator</text>
  <rect x="360" y="556" width="24" height="12" rx="2" fill="rgba(45,49,66,0.02)" stroke="rgba(45,49,66,0.30)" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="392" y="564" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Worktree boundary</text>
  <line x1="512" y1="562" x2="540" y2="562" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="548" y="564" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Flow</text>
  <line x1="600" y1="562" x2="628" y2="562" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="636" y="564" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Refactor loop</text>
</svg>
