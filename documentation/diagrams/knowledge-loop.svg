<svg viewBox="0 0 1120 536" xmlns="http://www.w3.org/2000/svg" font-family="'Geist', system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/></marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/></marker>
    <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2e5aa8"/></marker>
  </defs>

  <rect width="100%" height="100%" fill="#f5f5f5"/>

  <!-- Arrows (before boxes) -->
  <!-- A -> B: curate -->
  <line x1="288" y1="124" x2="444" y2="124" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="340" y="108" width="52" height="12" rx="2" fill="#f5f5f5"/>
  <text x="366" y="116" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">CURATE</text>
  <!-- B -> C: read (accent) -->
  <line x1="672" y1="124" x2="828" y2="124" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
  <rect x="728" y="108" width="40" height="12" rx="2" fill="#f5f5f5"/>
  <text x="748" y="116" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">READ</text>
  <!-- C -> D: citations -->
  <line x1="944" y1="160" x2="944" y2="372" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="908" y="260" width="72" height="12" rx="2" fill="#f5f5f5"/>
  <text x="944" y="268" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">CITATIONS</text>
  <!-- D -> E: usage report (on demand) -->
  <line x1="828" y1="412" x2="676" y2="412" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <rect x="716" y="396" width="76" height="12" rx="2" fill="#f5f5f5"/>
  <text x="754" y="404" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">USAGE REPORT</text>
  <!-- E -> F: propose -->
  <line x1="444" y1="412" x2="292" y2="412" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <rect x="340" y="396" width="56" height="12" rx="2" fill="#f5f5f5"/>
  <text x="368" y="404" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">PROPOSE</text>
  <!-- F -> A: apply -->
  <line x1="176" y1="372" x2="176" y2="164" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <rect x="152" y="260" width="48" height="12" rx="2" fill="#f5f5f5"/>
  <text x="176" y="268" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">APPLY</text>

  <!-- A: state-manager -->
  <rect x="64" y="88" width="224" height="72" rx="6" fill="#f5f5f5"/>
  <rect x="64" y="88" width="224" height="72" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="176" y="112" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">state-manager</text>
  <text x="176" y="128" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">refactor-curation mode</text>
  <text x="176" y="144" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">writes conventions</text>

  <!-- B: project knowledge (focal store) -->
  <rect x="448" y="88" width="224" height="72" rx="6" fill="#f5f5f5"/>
  <rect x="448" y="88" width="224" height="72" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
  <text x="560" y="112" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">project knowledge</text>
  <text x="560" y="128" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">.project/knowledge/&lt;type&gt;/</text>
  <text x="560" y="144" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">conventions + _index.md</text>

  <!-- C: developer + code-reviewer -->
  <rect x="832" y="88" width="224" height="72" rx="6" fill="#f5f5f5"/>
  <rect x="832" y="88" width="224" height="72" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="944" y="116" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">developer + code-reviewer</text>
  <text x="944" y="136" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">read before every phase</text>

  <!-- D: quality-analyst -->
  <rect x="832" y="376" width="224" height="72" rx="6" fill="#f5f5f5"/>
  <rect x="832" y="376" width="224" height="72" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="944" y="400" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">quality-analyst</text>
  <text x="944" y="416" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">milestone synthesis run</text>
  <text x="944" y="432" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">knowledge-usage report</text>

  <!-- E: knowledge-curator -->
  <rect x="448" y="376" width="224" height="72" rx="6" fill="#f5f5f5"/>
  <rect x="448" y="376" width="224" height="72" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="560" y="400" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">knowledge-curator</text>
  <text x="560" y="416" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">cleanup proposal</text>
  <text x="560" y="432" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">stale · gaps · promotions</text>

  <!-- F: you approve (input) -->
  <rect x="64" y="376" width="224" height="72" rx="6" fill="#f5f5f5"/>
  <rect x="64" y="376" width="224" height="72" rx="6" fill="rgba(79,93,117,0.10)" stroke="#7a8399" stroke-width="1"/>
  <text x="176" y="404" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">you approve</text>
  <text x="176" y="424" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">state-manager applies (project-level)</text>

  <!-- Callout -->
  <text x="64" y="40" fill="#2d3142" font-size="14" font-style="italic" font-family="'Instrument Serif', Georgia, serif">seeded by refactor cycles' convention-doc phases</text>
  <path d="M 240 48 Q 220 64 196 80" fill="none" stroke="rgba(45,49,66,0.40)" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="192" cy="84" r="2" fill="#2d3142"/>

  <!-- Legend -->
  <line x1="40" y1="488" x2="1080" y2="488" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
  <text x="40" y="504" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>
  <rect x="40" y="512" width="24" height="12" rx="2" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
  <text x="72" y="520" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">The hub — curated conventions</text>
  <line x1="280" y1="518" x2="308" y2="518" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="316" y="520" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Every cycle / milestone</text>
  <line x1="480" y1="518" x2="508" y2="518" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="516" y="520" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">On demand · human-approved</text>
</svg>
