<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The per-phase build loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #f5f5f5;
      --color-ink:     #2d3142;
      --color-muted:   #4f5d75;
      --color-accent:  #eb6c36;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 960px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }
    svg { width: 100%; min-width: 800px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Flowchart · Agentic Pipeline</p>
    <h1>The per-phase build loop</h1>

<svg viewBox="0 0 960 880" xmlns="http://www.w3.org/2000/svg" font-family="'Geist', system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/></marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/></marker>
    <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2e5aa8"/></marker>
  </defs>

  <rect width="100%" height="100%" fill="#f5f5f5"/>

  <!-- Arrows (before boxes) -->
  <line x1="440" y1="128" x2="440" y2="204" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="404" y="156" width="72" height="12" rx="2" fill="#f5f5f5"/>
  <text x="440" y="164" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">COMPLETED</text>
  <line x1="540" y1="80" x2="652" y2="80" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="560" y="60" width="76" height="12" rx="2" fill="#f5f5f5"/>
  <text x="598" y="68" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">NOT COMPLETED</text>
  <line x1="652" y1="112" x2="544" y2="112" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <rect x="572" y="120" width="48" height="12" rx="2" fill="#f5f5f5"/>
  <text x="596" y="128" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">RESUME</text>
  <line x1="440" y1="272" x2="440" y2="348" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="420" y="300" width="40" height="12" rx="2" fill="#f5f5f5"/>
  <text x="440" y="308" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">PASS</text>
  <path d="M 340 240 C 248 240, 248 80, 336 80" fill="none" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <rect x="216" y="160" width="56" height="12" rx="2" fill="#f5f5f5"/>
  <text x="244" y="168" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">FAIL → FIX</text>
  <line x1="440" y1="432" x2="440" y2="508" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="540" y1="544" x2="652" y2="544" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="568" y="528" width="56" height="12" rx="2" fill="#f5f5f5"/>
  <text x="596" y="536" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">ANY FAIL</text>
  <path d="M 896 544 L 928 544 L 928 40 L 440 40 L 440 60" fill="none" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <rect x="652" y="36" width="64" height="12" rx="2" fill="#f5f5f5"/>
  <text x="684" y="44" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">FIX · L1–2</text>
  <line x1="440" y1="576" x2="440" y2="652" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
  <rect x="408" y="604" width="64" height="12" rx="2" fill="#f5f5f5"/>
  <text x="440" y="612" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">ALL PASS</text>
  <line x1="440" y1="720" x2="440" y2="772" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="400" y="736" width="80" height="12" rx="2" fill="#f5f5f5"/>
  <text x="440" y="744" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">YOU CONFIRM</text>
  <path d="M 356 800 L 120 800 L 120 112 L 336 112" fill="none" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Node: developer (focal) -->
  <rect x="340" y="64" width="200" height="64" rx="6" fill="#f5f5f5"/>
  <rect x="340" y="64" width="200" height="64" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
  <text x="440" y="92" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">developer</text>
  <text x="440" y="108" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">implement + self-verify</text>

  <!-- Node: bounded recovery -->
  <rect x="656" y="56" width="240" height="80" rx="6" fill="#f5f5f5"/>
  <rect x="656" y="56" width="240" height="80" rx="6" fill="rgba(45,49,66,0.02)" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="776" y="84" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">bounded recovery</text>
  <text x="776" y="104" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">continuation · handoff rebuild</text>
  <text x="776" y="120" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">caps → escalate to you</text>

  <!-- Node: code-reviewer -->
  <rect x="340" y="208" width="200" height="64" rx="6" fill="#f5f5f5"/>
  <rect x="340" y="208" width="200" height="64" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="440" y="236" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">code-reviewer</text>
  <text x="440" y="252" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">PHASE_REVIEW → PASS / FAIL</text>

  <!-- Node: test plan + tests -->
  <rect x="340" y="352" width="200" height="80" rx="6" fill="#f5f5f5"/>
  <rect x="340" y="352" width="200" height="80" rx="6" fill="rgba(45,49,66,0.02)" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="440" y="380" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">test plan + tests</text>
  <text x="440" y="396" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">plan-architect · developer(test)</text>
  <text x="440" y="412" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">TEST_REVIEW · feature flow only</text>

  <!-- Node: test-runner -->
  <rect x="340" y="512" width="200" height="64" rx="6" fill="#f5f5f5"/>
  <rect x="340" y="512" width="200" height="64" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="440" y="540" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">test-runner</text>
  <text x="440" y="556" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">full suite · attribution</text>

  <!-- Node: code-investigator -->
  <rect x="656" y="504" width="240" height="80" rx="6" fill="#f5f5f5"/>
  <rect x="656" y="504" width="240" height="80" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="776" y="532" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">code-investigator</text>
  <text x="776" y="548" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">root cause · LEVEL 1–4</text>
  <text x="776" y="564" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">L3–4 + accepted-failure → you</text>

  <!-- Node: state-manager -->
  <rect x="340" y="656" width="200" height="64" rx="6" fill="#f5f5f5"/>
  <rect x="340" y="656" width="200" height="64" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="440" y="680" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">state-manager</text>
  <text x="440" y="696" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">phase summary + residual handoff</text>
  <text x="440" y="712" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">+ progress-tracker update</text>

  <!-- Node: next phase (oval) -->
  <rect x="356" y="776" width="168" height="48" rx="24" fill="#f5f5f5"/>
  <rect x="356" y="776" width="168" height="48" rx="24" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
  <text x="440" y="804" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">phase N+1</text>

  <!-- Legend -->
  <line x1="40" y1="840" x2="920" y2="840" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
  <text x="40" y="856" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND · PER-PHASE COUNTERS BOUND EVERY LOOP</text>
  <rect x="40" y="864" width="24" height="12" rx="2" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
  <text x="72" y="872" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Focal agent</text>
  <rect x="200" y="864" width="24" height="12" rx="2" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="232" y="872" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Pipeline agent</text>
  <rect x="384" y="864" width="24" height="12" rx="2" fill="rgba(45,49,66,0.02)" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="416" y="872" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Conditional / flow-dependent</text>
  <line x1="584" y1="870" x2="612" y2="870" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
  <text x="620" y="872" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Happy path</text>
  <line x1="728" y1="870" x2="756" y2="870" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="764" y="872" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Recovery route</text>
</svg>
  </div>
</body>
</html>
