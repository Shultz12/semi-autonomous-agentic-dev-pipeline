<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scout-and-refactor &amp; primitives</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #f5f5f5;
      --color-ink:     #2d3142;
      --color-muted:   #4f5d75;
      --color-accent:  #eb6c36;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 1000px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }
    svg { width: 100%; min-width: 840px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Flowchart · Agentic Pipeline</p>
    <h1>Scout-and-refactor &amp; primitives</h1>

<svg viewBox="0 0 1000 840" xmlns="http://www.w3.org/2000/svg" font-family="'Geist', system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/></marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/></marker>
    <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2e5aa8"/></marker>
  </defs>

  <rect width="100%" height="100%" fill="#f5f5f5"/>

  <!-- Arrows (before boxes) -->
  <line x1="320" y1="96" x2="320" y2="148" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="320" y1="232" x2="320" y2="284" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="320" y1="368" x2="320" y2="420" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="320" y1="496" x2="320" y2="548" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="416" y1="600" x2="508" y2="600" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
  <rect x="428" y="584" width="64" height="12" rx="2" fill="#f5f5f5"/>
  <text x="460" y="592" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">APPROVED</text>
  <line x1="320" y1="648" x2="320" y2="700" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="300" y="664" width="40" height="12" rx="2" fill="#f5f5f5"/>
  <text x="320" y="672" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">NONE</text>
  <line x1="712" y1="600" x2="764" y2="600" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="868" y1="636" x2="868" y2="700" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Entry oval -->
  <rect x="200" y="40" width="240" height="56" rx="28" fill="#f5f5f5"/>
  <rect x="200" y="40" width="240" height="56" rx="28" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
  <text x="320" y="64" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">post-merge / primitives</text>
  <text x="320" y="80" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Scout-status: pending · or manual</text>

  <!-- Scouts -->
  <rect x="220" y="152" width="200" height="80" rx="6" fill="#f5f5f5"/>
  <rect x="220" y="152" width="200" height="80" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="320" y="180" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">pattern-analyst</text>
  <text x="320" y="196" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">divergence + convergence scouts</text>
  <text x="320" y="212" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">or primitives-scout</text>

  <!-- Auditor -->
  <rect x="220" y="288" width="200" height="80" rx="6" fill="#f5f5f5"/>
  <rect x="220" y="288" width="200" height="80" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="320" y="312" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">pattern-analyst-auditor</text>
  <text x="320" y="332" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">re-checks every citation</text>
  <text x="320" y="348" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">ACCEPT · REJECT · MODIFY-AS</text>

  <!-- Curate (focal) -->
  <rect x="220" y="424" width="200" height="72" rx="6" fill="#f5f5f5"/>
  <rect x="220" y="424" width="200" height="72" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
  <text x="320" y="452" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">pattern-analyst · curate</text>
  <text x="320" y="468" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">pattern-approved.md</text>

  <!-- Decision diamond -->
  <polygon points="320,552 416,600 320,648 224,600" fill="#f5f5f5"/>
  <polygon points="320,552 416,600 320,648 224,600" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="320" y="596" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">approved</text>
  <text x="320" y="612" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">proposals?</text>

  <!-- Empty close-out oval -->
  <rect x="192" y="704" width="256" height="64" rx="32" fill="#f5f5f5"/>
  <rect x="192" y="704" width="256" height="64" rx="32" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
  <text x="320" y="724" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">ship &amp; close-out</text>
  <text x="320" y="740" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">entry removed · scout=empty-result</text>
  <text x="320" y="756" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">/accept-feature</text>

  <!-- Refactor plan gate -->
  <rect x="512" y="564" width="200" height="72" rx="6" fill="#f5f5f5"/>
  <rect x="512" y="564" width="200" height="72" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="612" y="592" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">refactor plan gate</text>
  <text x="612" y="608" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">plan-architect + plan-auditor</text>

  <!-- Per-phase core loop -->
  <rect x="768" y="564" width="200" height="72" rx="6" fill="#f5f5f5"/>
  <rect x="768" y="564" width="200" height="72" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="868" y="588" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">per-phase core loop</text>
  <text x="868" y="604" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">test steps F·G skipped</text>
  <text x="868" y="620" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">regression run only</text>

  <!-- Accept oval -->
  <rect x="784" y="704" width="168" height="56" rx="28" fill="#f5f5f5"/>
  <rect x="784" y="704" width="168" height="56" rx="28" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
  <text x="868" y="736" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">/accept-feature</text>

  <!-- Callout: ABSTRACT ownership -->
  <text x="948" y="48" fill="#2d3142" font-size="14" font-style="italic" font-family="'Instrument Serif', Georgia, serif" text-anchor="end">sole owner of ABSTRACT decisions</text>
  <path d="M 836 56 Q 640 104 432 172" fill="none" stroke="rgba(45,49,66,0.40)" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="428" cy="176" r="2" fill="#2d3142"/>

  <!-- Callout: Stage carve-out -->
  <text x="448" y="520" fill="#4f5d75" font-size="14" font-style="italic" font-family="'Instrument Serif', Georgia, serif">orchestrator flips Stage: → post-curate</text>
  <path d="M 480 528 Q 492 560 500 588" fill="none" stroke="rgba(45,49,66,0.30)" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="500" cy="592" r="2" fill="#4f5d75"/>

  <!-- Legend -->
  <line x1="40" y1="788" x2="960" y2="788" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
  <text x="40" y="804" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>
  <rect x="40" y="812" width="24" height="12" rx="2" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
  <text x="72" y="820" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Curate — writes pattern-approved.md</text>
  <polygon points="280,818 292,812 304,818 292,824" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="312" y="820" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Decision</text>
  <line x1="396" y1="818" x2="424" y2="818" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
  <text x="432" y="820" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Approved path → migration cycle</text>
  <rect x="624" y="812" width="24" height="12" rx="6" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
  <text x="656" y="820" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Entry / close-out (oval)</text>
</svg>
  </div>
</body>
</html>
